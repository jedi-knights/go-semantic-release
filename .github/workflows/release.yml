name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

# Prevent concurrent releases — a second push to main while a release is in
# progress would create duplicate tags or conflicting changelog commits.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Skip release commits pushed by this workflow.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true
          # Use a PAT so that git operations (tag push) performed by
          # semantic-release are authenticated with a user token. Tags pushed
          # via the default GITHUB_TOKEN are blocked from triggering downstream
          # workflows (e.g. goreleaser.yml) by GitHub.
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build semantic-release
        run: go build -o bin/semantic-release ./cmd/semantic-release

      - name: Configure git identity
        run: |
          git config user.name "semantic-release-bot"
          git config user.email "semantic-release-bot@users.noreply.github.com"

      - name: Plan release
        id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          output=$(./bin/semantic-release plan 2>&1) || true
          echo "$output"
          if echo "$output" | grep -q "No releasable changes"; then
            echo "has_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run semantic-release
        if: steps.plan.outputs.has_release == 'true'
        env:
          # Use a PAT rather than GITHUB_TOKEN so that the tag push triggers
          # the goreleaser.yml workflow. Tags pushed via GITHUB_TOKEN are
          # intentionally blocked from triggering downstream workflows by GitHub.
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: ./bin/semantic-release --ci --no-interactive

      - name: Commit release artifacts
        if: steps.plan.outputs.has_release == 'true'
        run: |
          # Stage any files written by the prepare step.
          git add -f CHANGELOG.md VERSION 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No release artifacts to commit."
            exit 0
          fi
          git commit -m "chore(release): update CHANGELOG.md and VERSION [skip ci]"
          git push

      - name: Forward floating major version tag
        if: steps.plan.outputs.has_release == 'true'
        run: |
          # Keep the floating major-version tag (e.g. v0) pointing at the
          # latest patch release so consumers can pin to @v0 instead of a
          # specific patch version and get updates automatically.
          VERSION=$(cat VERSION)
          MAJOR="v${VERSION%%.*}"
          git tag -f "$MAJOR" "v${VERSION}"
          git push origin "$MAJOR" --force
