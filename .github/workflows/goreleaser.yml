name: GoReleaser

on:
  push:
    tags:
      # Match only full semver tags (e.g. v1.2.3). Floating major-version tags
      # like v0 or v1 also match 'v*' and would trigger a duplicate release run.
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  goreleaser:
    name: Release binaries
    runs-on: ubuntu-latest
    concurrency:
      group: goreleaser-release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
