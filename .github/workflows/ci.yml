name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./... -race -count=1 -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache golangci-lint
        id: lint-cache
        uses: actions/cache@v5
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-v1.64.8-go${{ hashFiles('go.mod') }}

      - name: Install golangci-lint
        if: steps.lint-cache.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: golangci-lint
        run: ~/go/bin/golangci-lint run ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -o bin/semantic-release ./cmd/semantic-release

      - name: Verify binary
        run: ./bin/semantic-release --help
