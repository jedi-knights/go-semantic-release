version: 2

project_name: semantic-release

builds:
  - id: semantic-release
    main: ./cmd/semantic-release
    binary: semantic-release
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

# go-semantic-release writes CHANGELOG.md before GoReleaser runs.
# Disable GoReleaser's own changelog to avoid duplication.
changelog:
  disable: true

release:
  draft: false
  prerelease: auto
