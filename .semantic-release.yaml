# semantic-release configuration
# See README.md for full documentation of all options

release_mode: repo
tag_format: "v{{.Version}}"
project_tag_format: "{{.Project}}/v{{.Version}}"
dry_run: false
discover_modules: false
dependency_propagation: false

branches:
  - name: main
    is_default: true
  - name: master
    is_default: true
  - name: next
    prerelease: true
    channel: next
  - name: beta
    prerelease: true
    channel: beta
  - name: alpha
    prerelease: true
    channel: alpha

# Uncomment for monorepo with independent projects:
# release_mode: independent
# projects:
#   - name: api
#     path: services/api
#     tag_prefix: "api/"
#   - name: worker
#     path: services/worker
#     tag_prefix: "worker/"
#     dependencies:
#       - shared
#   - name: shared
#     path: pkg/shared
#     tag_prefix: "shared/"

prepare:
  changelog_file: CHANGELOG.md
  version_files:
    - VERSION

git:
  assets:
    - CHANGELOG.md
    - VERSION
  message: "chore(release): {{.Version}} [skip ci]\n\n{{.Notes}}"

github:
  # GoReleaser creates the GitHub release and attaches pre-built binaries.
  # go-semantic-release handles tagging and changelog only.
  create_release: false
  owner: jedi-knights
  repo: go-semantic-release
  # token is read from GH_TOKEN, GITHUB_TOKEN, or SEMANTIC_RELEASE_GITHUB_TOKEN
